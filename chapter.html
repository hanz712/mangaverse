<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MangaVerse | Manga Reader</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link rel="stylesheet" href="css/animation.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .reader-container {
            max-width: 800px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            background: #000;
            padding: 10px 0;
            border-radius: var(--radius-lg);
        }
        .reader-image {
            width: 100%;
            height: auto;
            display: block;
        }
        .navigation-box {
            display: flex;
            justify-content: space-between;
            width: 100%;
            max-width: 800px;
            margin: 0 auto 20px auto;
            padding: 12px 20px;
            background: var(--glass-bg);
            border-radius: var(--radius-md);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
        }
        .nav-btn {
            background: var(--accent-color);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: var(--radius-md);
            cursor: pointer;
            font-weight: 600;
            text-decoration: none;
            font-size: 0.9rem;
        }
        .nav-btn:hover { 
            background: var(--accent-hover); 
        }
    </style>
</head>
<body class="dark-theme">

    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">Manga<span>Verse</span></a>
            <div class="nav-links">
                <a href="index.html">Home</a>
            </div>
        </div>
    </nav>

    <main class="container">
        <div class="navigation-box">
            <a href="index.html" class="nav-btn">← Beranda</a>
            <span id="chapter-title" style="align-self: center; font-weight: 600; font-size: 0.95rem;">Memuat Halaman...</span>
        </div>

        <div id="loading-reader" class="loading-spinner"></div>

        <div class="reader-container hidden" id="image-container">
            </div>
    </main>

    <script src="js/api.js"></script>
    <script src="js/chapter.js"></script>
</body>
</html>
